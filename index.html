<!DOCTYPE html>
<html lang="en">
    <head>
        <title>DJEM</title>
        <link rel="stylesheet" href="css/styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
<body>
    <section class="hero">
        <h1 class="DJ">DJ</h1>
        <h2 class="EM">EM</h2>
        <div class="subtitle">
            <p>fashion show</p>
        </div>
        <button class="zerobtn"></button>
        </div>
        <button class="firstbtn"></button>
        <div class="hero-overlay1">
        </div>
        <button class="secondbtn"></button>
        <div class="hero-overlay2">
        </div>
        <button class="thirdbtn"></button>
        <div class="hero-overlay3">
        </div>
        <button class="fourthbtn"></button>
        <div class="hero-overlay4">
        </div>
    </section>
    <section class="second">
       <h1 class="Capsules">Капсулы #2026</h1>
        <div class="subtitle2">
            <p>наведи на капсулу, чтобы покрутить ее</p>
        </div>
        <div class="hoverplay"></div>
        <div class="hoverplay2"></div>
        <div class="hoverplay3"></div>
        <div class="hoverplay4"></div>
        <div class="num">
            <img src="images/numbers.svg">
        </div>
    </section>
    <section class="line">
            <div class="running1">
            <h3 class="dance">DANCE + STREET</h3>
            <h4 class="jazz">JAZZ + OLD MONEY</h4>
            <h5 class="electro">ELECTRO + OFFICE</h5>
            <h6 class=metal>METAL + GRUNGE</h6>
            </div>
        </div>
        </div>
    </section>
    <section class="third">
        <div class="subline3">
            <img src="images/core.svg">
        </div>
        <div class="subline4">
            <img src="images/to djem.svg">
        </div>
        <div class="base">
            <img src="images/blue.svg">
        </div>
        <button id="play" class="play">
        </button>
        <button id="pause" class="pause">
        </button>
        </div>
        
        <div class="outfits" id="outfits">
            <img src="images/outfits.png" alt="аутфиты">
        </div>
        <script>
            const outfits = document.getElementById("outfits");
            document.getElementById("play").onclick = () =>{
                outfits.style.animationPlayState = "running";
            };
            document.getElementById ("pause").onclick = () => {
                outfits.style.animationPlayState = "paused";
            };
        </script>
        
    </section>
    <section class="fourth">
        <div class="eventdate">
            <p>25/05/26</p>
        </div>
        <div class="eventplace">
            <p>ул.Миллионная, д.1</p>
        </div>
        <div class="logo">
            <img src="images/logo.svg" alt="логотип">
        </div>
        <div class="when">
            <img src="images/when.svg">
        </div>
        <div class="where">
            <img src="images/where.svg">
        </div>
        <div class="finalgif">

        </div>
    </section>
    <section class="five">
        <div class="lefttext">
            <p>capsuleevent@yandex.ru<br>+79412324211</p>
        </div>
        <div class="righttext">
            <p>г. Санкт-Петербург, ул. Миллионная, д.1<br>
            2025</p>
        </div>
        
    </section>

</body>
